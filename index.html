<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>mreow hi</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Mail Button */
    #mailBtn {
      padding: 20px 40px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      background: black;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #mailBtn:hover {
      transform: scale(1.1);
      background: #333;
    }

    /* Popup */
    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      opacity: 0;
      transition: all 0.5s ease;
      pointer-events: none;
    }

    #popup.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    #popup img {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* Overlay fade */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.9);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <button id="mailBtn">📩 Open Mail</button>

  <div id="overlay"></div>

  <div id="popup">
    <img src="picture1.jpg" alt="Memory">
  </div>

  <!-- Audio -->
  <audio id="audio1" src="audio1.mp3"></audio>
  <audio id="audio2" src="audio2.mp3"></audio>

  <script>
    const btn = document.getElementById("mailBtn");
    const popup = document.getElementById("popup");
    const overlay = document.getElementById("overlay");

    const audio1 = document.getElementById("audio1");
    const audio2 = document.getElementById("audio2");

    btn.addEventListener("click", () => {
      popup.classList.add("active");
      overlay.classList.add("active");

      // Play both audios together
      audio1.play();
      audio2.play();

      btn.style.display = "none";
    });

    // Click anywhere to close
    overlay.addEventListener("click", () => {
      popup.classList.remove("active");
      overlay.classList.remove("active");

      audio1.pause();
      audio2.pause();
    });
  </script>

</body>
</html>
