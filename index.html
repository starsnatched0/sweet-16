<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>mreow</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    img {
      max-width: 80vw;
      max-height: 80vh;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <!-- Image -->
  <img src="picture1.jpg" alt="">

  <!-- Audio -->
  <audio autoplay loop>
    <source src="audio1.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
